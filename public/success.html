<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — PoffBank Secure Payments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --success: #10b981;
            --border: #2a2a3a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .success-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: var(--success);
        }

        .success-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .success-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .receipt-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .receipt-row:last-child {
            margin-bottom: 0;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .receipt-label {
            color: var(--text-secondary);
        }

        .receipt-value {
            font-weight: 500;
        }

        .receipt-value.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--success);
        }

        .transaction-hash {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            margin-top: 0.75rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--success);
            border: none;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .merchant-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .merchant-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1 class="success-title">Payment Successful!</h1>
        <p class="success-message" id="message">
            Your payment is being confirmed on-chain. This page will update automatically.
        </p>
        
        <div class="receipt-box">
            <div class="receipt-row">
                <span class="receipt-label">Order ID</span>
                <span class="receipt-value" id="orderId">—</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Amount</span>
                <span class="receipt-value total" id="amount">$0.00</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Currency</span>
                <span class="receipt-value">USDT (TRC20)</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Status</span>
                <span class="receipt-value" id="status" style="color: var(--success);">Confirming…</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Transaction Hash</span>
            </div>
            <div class="transaction-hash" id="txHash">
                Pending…
            </div>
        </div>
        
        <a href="/pay.html" class="back-button">
            <span>←</span>
            <span>New Payment</span>
        </a>
        
        <div class="merchant-info">
            <p class="merchant-name">PoffBank Secure Payments</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id')
            || urlParams.get('orderId')
            || urlParams.get('invoice_id')
            || (function () { try { return localStorage.getItem('poffbank.lastOrderId'); } catch (e) { return null; } })();

        const STATUS_LABELS = {
            waiting: { text: 'Awaiting payment', color: '#f59e0b' },
            confirming: { text: 'Confirming on-chain', color: '#f59e0b' },
            partially_paid: { text: 'Partially paid', color: '#f59e0b' },
            completed: { text: 'Confirmed', color: 'var(--success)' },
            failed: { text: 'Failed', color: '#ef4444' },
        };

        if (orderId) {
            document.getElementById('orderId').textContent = orderId;
            poll();
        } else {
            document.getElementById('message').textContent = 'No order reference found.';
        }

        async function poll() {
            try {
                const res = await fetch(`/api/payment/status/${encodeURIComponent(orderId)}`);
                const data = await res.json();
                if (data && data.success) {
                    const amt = Number(data.amount || 0).toFixed(2);
                    document.getElementById('amount').textContent = '$' + amt;
                    const lbl = STATUS_LABELS[data.status] || { text: data.status || '—', color: 'var(--text-secondary)' };
                    const statusEl = document.getElementById('status');
                    statusEl.textContent = lbl.text;
                    statusEl.style.color = lbl.color;
                    document.getElementById('txHash').textContent = data.txHash || 'Pending…';
                    if (data.status === 'completed') {
                        document.getElementById('message').textContent =
                            'Thank you. Your payment has been confirmed on-chain.';
                        return; // stop polling
                    }
                    if (data.status === 'failed') {
                        document.getElementById('message').textContent =
                            'This payment did not complete. Please start a new payment.';
                        return;
                    }
                }
            } catch (err) {
                console.warn('status poll failed', err);
            }
            setTimeout(poll, 5000);
        }
    </script>
</body>
</html>
