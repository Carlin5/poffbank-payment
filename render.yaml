services:
  - type: web
    name: poffbank-secure-payments
    runtime: node
    plan: free            # upgrade to 'starter' ($7/mo) to disable cold-start sleep
    region: oregon        # change if you prefer another region
    healthCheckPath: /api/health
    buildCommand: npm install --omit=dev
    startCommand: npm start       # runs server-clean.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Single-origin: API and the checkout pages live on the same Render URL.
      # After the first deploy, replace these with your real *.onrender.com host
      # (or your custom domain).
      - key: BASE_URL
        value: https://poffbank-secure-payments.onrender.com
      - key: FRONTEND_URL
        value: https://poffbank-secure-payments.onrender.com

      - key: COMPANY_NAME
        value: PoffBank Secure Payments
      - key: COMPANY_SHORT
        value: PoffBank
      - key: DEFAULT_CURRENCY
        value: usd
      - key: DEFAULT_CRYPTO_CURRENCY
        value: usdttrc20

      # Secrets — set the actual values in the Render dashboard,
      # NOT in this file. sync:false tells Render to keep them out of git.
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false

      # USDT TRC-20 merchant wallet — the destination for ALL card → USDT
      # payments (and for the direct-USDT method). Settle straight on-chain.
      - key: USDT_TRC20_WALLET
        value: TURXbzSQQKTiA6fqMzsZMaFQyXAU7o2nXh

      # Card → USDT on-ramp keys. By default the gateway uses the no-KYB
      # NOWPayments + MoonPay-public fallbacks (no extra config needed).
      # Fill these only after you pass partner KYB and want branded checkout.
      - key: TRANSAK_API_KEY
        sync: false
      - key: TRANSAK_ENVIRONMENT
        value: STAGING
      - key: TRANSAK_WEBHOOK_SECRET
        sync: false
      - key: MOONPAY_API_KEY
        sync: false
      - key: MOONPAY_SECRET_KEY
        sync: false
      - key: MOONPAY_ENVIRONMENT
        value: sandbox
